name: lan_transfer
description: LAN file and text transfer tool - cross platform
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP 服务端
  shelf: ^1.4.1
  shelf_router: ^1.1.4

  # HTTP 客户端（含进度条）
  dio: ^5.4.3+1

  # 二维码生成
  qr_flutter: ^4.1.0

  # 二维码扫描（iOS/Android）
  mobile_scanner: ^5.2.3

  # 文件选择
  file_picker: ^8.1.2

  # 文件保存路径
  path_provider: ^2.1.3

  # 打开接收到的文件
  open_file: ^3.3.2

  # 获取本机 IP
  network_info_plus: ^6.0.1

  # mDNS 局域网设备自动发现（全平台）
  bonsoir: ^5.1.1

  # 设备信息（名称、系统）
  device_info_plus: ^10.1.2

  # 状态管理
  provider: ^6.1.2

  # 唯一 ID
  uuid: ^4.4.2

  # 文件大小格式化等
  intl: ^0.19.0

  # 屏幕常亮（Android / iOS）
  wakelock_plus: ^1.1.4

  # 持久化设置和消息记录
  shared_preferences: ^2.2.3

  # 图标
  cupertino_icons: ^1.0.8

dependency_overrides:
  # package_info_plus 9.x uses flutter.compileSdkVersion in its build.gradle
  # which is incompatible with Flutter 3.24.5 / AGP setup. Pin to 8.x.
  package_info_plus: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true

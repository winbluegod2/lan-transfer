name: Build All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.5'

# 允许创建 Release 和上传 artifacts
permissions:
  contents: write

# ══════════════════════════════════════════════════════════════════════════════
# Windows → LanTransferSetup.exe
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  build-windows:
    name: Windows EXE Installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Generate platform files
        run: flutter create . --project-name lan_transfer --org com.lantransfer --platforms windows

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: iscc installer\windows_installer.iss

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/output/LanTransferSetup.exe
          retention-days: 30

# ══════════════════════════════════════════════════════════════════════════════
# Android → app-release.apk
# ══════════════════════════════════════════════════════════════════════════════
  build-android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Generate platform files
        run: flutter create . --project-name lan_transfer --org com.lantransfer --platforms android

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

# ══════════════════════════════════════════════════════════════════════════════
# macOS → LanTransfer.dmg
# ══════════════════════════════════════════════════════════════════════════════
  build-macos:
    name: macOS DMG
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Generate platform files
        run: flutter create . --project-name lan_transfer --org com.lantransfer --platforms macos

      - name: Install dependencies
        run: flutter pub get

      - name: Set macOS deployment target to 10.15
        run: |
          # Podfile: 删掉所有 platform 行，在文件头插入正确版本
          grep -v "platform :osx" macos/Podfile > /tmp/_pf && mv /tmp/_pf macos/Podfile
          sed -i '' "1s/^/platform :osx, '10.15'\n/" macos/Podfile
          head -3 macos/Podfile
          # project.pbxproj + xcconfig
          find macos -name "project.pbxproj" -exec \
            sed -i '' 's/MACOSX_DEPLOYMENT_TARGET = [0-9.]*/MACOSX_DEPLOYMENT_TARGET = 10.15/g' {} \;
          find macos -name "*.xcconfig" -exec \
            sed -i '' 's/MACOSX_DEPLOYMENT_TARGET = [0-9.]*/MACOSX_DEPLOYMENT_TARGET = 10.15/g' {} \;
          echo "MACOSX_DEPLOYMENT_TARGET = 10.15" >> macos/Runner/Configs/AppInfo.xcconfig

      - name: Build macOS release
        env:
          MACOSX_DEPLOYMENT_TARGET: '10.15'
        run: flutter build macos --release

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          DMG_PATH="LanTransfer.dmg"
          APP_DIR="build/macos/Build/Products/Release/"

          create-dmg \
            --volname "LAN Transfer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "lan_transfer.app" 160 185 \
            --hide-extension "lan_transfer.app" \
            --app-drop-link 430 185 \
            --no-internet-enable \
            "$DMG_PATH" \
            "$APP_DIR" \
          || hdiutil create -volname "LAN Transfer" \
               -srcfolder "$APP_DIR" \
               -ov -format UDZO "$DMG_PATH"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: LanTransfer.dmg
          retention-days: 30

# ══════════════════════════════════════════════════════════════════════════════
# iOS → LanTransfer.ipa（免签名，可用 AltStore / Sideloadly 安装）
# ══════════════════════════════════════════════════════════════════════════════
  build-ios:
    name: iOS IPA
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Generate platform files
        run: flutter create . --project-name lan_transfer --org com.lantransfer --platforms ios

      - name: Install dependencies
        run: flutter pub get

      - name: Set iOS deployment target to 13.0
        run: |
          # Podfile
          grep -v "platform :ios" ios/Podfile > /tmp/_pf && mv /tmp/_pf ios/Podfile
          sed -i '' "1s/^/platform :ios, '13.0'\n/" ios/Podfile
          head -3 ios/Podfile
          # project.pbxproj + xcconfig
          find ios -name "project.pbxproj" -exec \
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' {} \;
          find ios -name "*.xcconfig" -exec \
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' {} \;

      - name: Build iOS release (no codesign)
        env:
          IPHONEOS_DEPLOYMENT_TARGET: '13.0'
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r LanTransfer.ipa Payload/
          rm -rf Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: LanTransfer.ipa
          retention-days: 30

# ══════════════════════════════════════════════════════════════════════════════
# 汇总：创建 GitHub Release（仅推 tag 时）
# ══════════════════════════════════════════════════════════════════════════════
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-android, build-macos, build-ios]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "LAN Transfer ${{ github.ref_name }}"
          body: |
            ## 下载安装

            | 平台 | 文件 | 说明 |
            |---|---|---|
            | Windows | `LanTransferSetup.exe` | 双击安装 |
            | Android | `app-release.apk` 或 `app-debug.apk` | 开启"未知来源"后安装 |
            | macOS | `LanTransfer.dmg` | 拖入 Applications |
            | iOS | `LanTransfer.ipa` | 用 AltStore / Sideloadly 安装 |

            > iOS 说明：此 IPA 为未签名版，需通过 [AltStore](https://altstore.io) 或 [Sideloadly](https://sideloadly.io) 安装。
          files: |
            artifacts/windows-installer/LanTransferSetup.exe
            artifacts/android-apk/*.apk
            artifacts/macos-dmg/LanTransfer.dmg
            artifacts/ios-ipa/LanTransfer.ipa
          draft: false
          prerelease: false
